name: Bug Report
description: Report an issue in the GitHub access CLI flow
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please include enough detail to reproduce the issue.
  - type: input
    id: command
    attributes:
      label: Command run
      description: The command you executed
      placeholder: python github_access_tool.py
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output/logs
      description: Redact all tokens/secrets before sharing
